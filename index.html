<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrixo - Control de Lotes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🚀 Panel Vrixo: Control de Lotes</h1>
        <div class="resumen-lote">
            <div class="stat">
                <span>Inversión Total (Lote + Envío)</span>
                <h2 id="total-inversion">0€</h2>
            </div>
            <div class="stat">
                <span>Recuperado (Ventas)</span>
                <h2 id="total-recuperado">0€</h2>
            </div>
            <div class="stat highlight">
                <span>Estado Actual</span>
                <h2 id="estado-beneficio">0€</h2>
            </div>
        </div>
    </header>

    <main>
        <section class="card inversion">
            <h2>📦 1. Registrar Compra de Lote / Gasto</h2>
            <div class="form-grid">
                <input type="date" id="g-fecha">
                <input type="text" id="g-concepto" placeholder="Nombre del Lote (Ej: Lote 40 camisas)">
                <input type="number" id="g-coste-lote" placeholder="Precio del Lote (€)">
                <input type="number" id="g-coste-envio" placeholder="Gastos de Envío (€)">
                <select id="g-plataforma">
                    <option value="Wallapop">Wallapop</option>
                    <option value="Vinted">Vinted</option>
                    <option value="Amazon">Amazon</option>
                    <option value="Otros">Otros</option>
                </select>
                <button onclick="registrarGasto()" class="btn-gasto">Registrar Inversión</button>
            </div>
        </section>

        <section class="card ventas">
            <h2>💰 2. Registrar Venta de Producto</h2>
            <div class="form-grid">
                <input type="date" id="v-fecha">
                <input type="text" id="v-producto" placeholder="Producto vendido (Ej: Camisa 1/40)">
                <input type="number" id="v-precio" placeholder="Precio de Venta (€)">
                <select id="v-plataforma">
                    <option value="Wallapop">Wallapop</option>
                    <option value="Vinted">Vinted</option>
                    <option value="Amazon">Amazon</option>
                    <option value="Mano">En mano</option>
                </select>
                <button onclick="registrarVenta()" class="btn-venta">Añadir Venta</button>
            </div>
        </section>

        <section class="filtros">
            <input type="text" id="buscador" onkeyup="filtrar()" placeholder="🔍 Buscar por nombre de lote o producto...">
            <select id="filtro-mes" onchange="filtrar()">
                <option value="todos">Todos los meses</option>
                </select>
        </section>

        <section class="card listado">
            <div class="header-tabla">
                <h2>Historial de Movimientos</h2>
                <button onclick="descargarExcel()" class="btn-excel">📥 Exportar para Hacienda</button>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Concepto / Producto</th>
                            <th>Plataforma</th>
                            <th>Inversión (Gasto)</th>
                            <th>Ingreso (Venta)</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
