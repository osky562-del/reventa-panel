<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Oportunidades Vrixo - Panel</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
}

table{
width:100%;
margin-top:20px;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<header>
🚀 Oportunidades Vrixo - Panel de negocio
</header>

<div class="container">

<div class="card">

<h2>Registrar venta</h2>

<input id="producto" placeholder="Producto">

<input id="coste" type="number" placeholder="Coste compra">

<input id="venta" type="number" placeholder="Precio venta">

<input id="envio" type="number" placeholder="Coste envío">

<button onclick="guardar()">Guardar venta</button>

</div>

<div class="card">

<h2>Beneficio total</h2>

<h1 id="beneficio">0 €</h1>

</div>

<div class="card">

<h2>Historial ventas</h2>

<table>

<thead>
<tr>
<th>Producto</th>
<th>Coste</th>
<th>Venta</th>
<th>Beneficio</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

</div>

<script>

let ventas = []

function guardar(){

let producto = document.getElementById("producto").value
let coste = Number(document.getElementById("coste").value)
let venta = Number(document.getElementById("venta").value)
let envio = Number(document.getElementById("envio").value)

let beneficio = venta - coste - envio

ventas.push({
producto,
coste,
venta,
beneficio
})

mostrar()

}

function mostrar(){

let tabla = document.getElementById("tabla")
tabla.innerHTML=""

let total=0

ventas.forEach(v=>{

total+=v.beneficio

tabla.innerHTML+=`
<tr>
<td>${v.producto}</td>
<td>${v.coste}€</td>
<td>${v.venta}€</td>
<td>${v.beneficio}€</td>
</tr>
`

})

document.getElementById("beneficio").innerText = total + " €"

}

</script>

</body>
</html>
