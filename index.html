<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrixo - Control de Stock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🚀 Control Vrixo Pro</h1>
        <div class="resumen-lote">
            <div class="stat"><span>Inversión Total</span><h2 id="total-inversion">0€</h2></div>
            <div class="stat"><span>Ventas Totales</span><h2 id="total-recuperado">0€</h2></div>
            <div class="stat highlight"><span>Beneficio Neto</span><h2 id="estado-beneficio">0€</h2></div>
        </div>
    </header>

    <main>
        <section class="card inversion">
            <h2>📦 1. Registrar Compra (Lote o Suelto)</h2>
            <div class="form-grid">
                <input type="date" id="g-fecha">
                <input type="text" id="g-concepto" placeholder="Nombre (Ej: Lote 40 Juguetes o iPhone Suelto)">
                <input type="number" id="g-coste" placeholder="Precio Compra (€)">
                <input type="number" id="g-envio" placeholder="Envío Pago (€)">
                <button onclick="registrarCompra()" class="btn-gasto">Registrar Entrada</button>
            </div>
        </section>

        <section class="card ventas">
            <h2>💰 2. Registrar Venta</h2>
            <div class="form-grid">
                <input type="date" id="v-fecha">
                <input type="text" id="v-producto" placeholder="¿Qué has vendido?">
                <input type="number" id="v-precio" placeholder="Precio Venta (€)">
                <select id="v-vinculo">
                    <option value="suelto">Es una venta suelta</option>
                    </select>
                <button onclick="registrarVenta()" class="btn-venta">Registrar Venta</button>
            </div>
        </section>

        <section class="card listado">
            <h2>Historial de Movimientos</h2>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Concepto</th>
                            <th>Inversión</th>
                            <th>Venta</th>
                            <th>Margen</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
