<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<body>

<header>

<p>Panel de negocio</p>

<main>

<input id="producto" placeholder="Producto">

<input id="coste" type="number" placeholder="Coste">

<input id="venta" type="number" placeholder="Precio venta">

<input id="envio" type="number" placeholder="Envío">

<button onclick="guardarVenta()">Guardar venta</button>

</section>

<section class="card">

<h2>Beneficio total</h2>

<h1 id="beneficio">0€</h1>

</section>

<section class="card">

<h2>Historial</h2>

<table>

<thead>

<tr>
<th>Producto</th>
<th>Coste</th>
<th>Venta</th>
<th>Beneficio</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</section>

</main>

<script src="app.js"></script>

</body>

</html>
